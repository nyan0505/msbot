services:
  msbot:
    build:
      context: .
      network: host
    container_name: msbot
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - hderc-internal-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hderc-internal-network"
      - "traefik.http.routers.msbot.rule=Host(`msbot.hdhyundai-erc.com`)"
      - "traefik.http.routers.msbot.entrypoints=websecure"
      - "traefik.http.routers.msbot.tls=true"
      - "traefik.http.routers.msbot.tls.certresolver=letsencrypt"
      - "traefik.http.services.msbot.loadbalancer.server.port=3978"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3978/api/messages', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  hderc-internal-network:
    external: true
